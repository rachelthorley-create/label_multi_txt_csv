<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Label Generator (CSV + SVG ZIP)</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
body{font-family:Arial;margin:18px;display:flex;flex-direction:column;align-items:center}
form{width:100%;max-width:900px}
label{display:block;margin:6px 0}
input,select{width:100%;padding:6px}
.button-row{display:flex;gap:10px;margin-top:8px;flex-wrap:wrap}
.advanced{display:none;border:1px solid #ddd;padding:10px;margin-top:8px}
canvas{width:378px;height:283px;border:1px solid #ccc}
</style>
</head>

<body>

<h2>Label Generator (Full Version)</h2>

<!-- CSV -->
<input type="file" id="csvFile">

<label><input type="checkbox" id="showHole" checked> Show hole</label>

<form onsubmit="return false;">

<label>Line 1 <input id="line1"></label>
<label>Line 2 <input id="line2"></label>
<label>Line 3 <input id="line3"></label>
<label>Qty <input id="qty1" type="number" value="1"></label>

<div class="button-row">
<button id="previewBtn">Preview</button>
<button id="downloadJson">Download JSON</button>
<button id="downloadZip">Download SVG ZIP</button>
</div>

</form>

<input id="numLabels" type="number" value="1">
<div id="labelsContainer"></div>
<div id="allPreviews"></div>

<script>
const mmToPx=mm=>mm*3.78;

const csvFile=document.getElementById('csvFile');
const showHole=document.getElementById('showHole');

const line1=document.getElementById('line1');
const line2=document.getElementById('line2');
const line3=document.getElementById('line3');
const qty1=document.getElementById('qty1');

const numLabelsEl=document.getElementById('numLabels');
const labelsContainer=document.getElementById('labelsContainer');
const allPreviews=document.getElementById('allPreviews');

/* ---------------- CSV ---------------- */
function parseCSV(text){
  const rows=[]; let cur=[]; let val=''; let q=false;
  for(let i=0;i<text.length;i++){
    let c=text[i];
    if(c=='"'){ if(q&&text[i+1]=='"'){val+='"';i++;} else q=!q;}
    else if(c==','&&!q){cur.push(val);val='';}
    else if((c=='\n'||c=='\r')&&!q){ if(val||cur.length){cur.push(val);rows.push(cur);cur=[];val='';}}
    else val+=c;
  }
  if(val||cur.length){cur.push(val);rows.push(cur);}
  return rows;
}

csvFile.addEventListener('change',e=>{
  const r=new FileReader();
  r.onload=()=>{
    const rows=parseCSV(r.result);
    numLabelsEl.value=rows.length;
    renderLabels();

    rows.forEach((row,i)=>{
      const q=row[1]||1;
      if(i===0){
        line1.value=row[2]||'';
        line2.value=row[3]||'';
        line3.value=row[4]||'';
        qty1.value=q;
      }else{
        document.querySelectorAll('.multi1')[i-1].value=row[2]||'';
        document.querySelectorAll('.multi2')[i-1].value=row[3]||'';
        document.querySelectorAll('.multi3')[i-1].value=row[4]||'';
        document.querySelectorAll('.qty')[i-1].value=q;
      }
    });
  };
  r.readAsText(e.target.files[0]);
});

/* ---------------- Labels UI ---------------- */
function renderLabels(){
  labelsContainer.innerHTML='';
  for(let i=2;i<=numLabelsEl.value;i++){
    const d=document.createElement('div');
    d.innerHTML=`
      <input class="multi1">
      <input class="multi2">
      <input class="multi3">
      <input class="qty" type="number" value="1">
    `;
    labelsContainer.appendChild(d);
  }
}
renderLabels();

/* ---------------- Collect ---------------- */
function collect(){
  const arr=[];

  arr.push({
    qty:qty1.value,
    l1:line1.value,
    l2:line2.value,
    l3:line3.value
  });

  document.querySelectorAll('.multi1').forEach((el,i)=>{
    arr.push({
      qty:document.querySelectorAll('.qty')[i].value,
      l1:el.value,
      l2:document.querySelectorAll('.multi2')[i].value,
      l3:document.querySelectorAll('.multi3')[i].value
    });
  });

  return arr;
}

/* ---------------- DRAW (original style) ---------------- */
function draw(lbl){
  const c=document.createElement('canvas');
  c.width=378; c.height=283;
  const ctx=c.getContext('2d');

  ctx.fillStyle='#000';
  ctx.fillRect(0,0,378,283);

  if(showHole.checked){
    ctx.beginPath();
    ctx.arc(189,30,15,0,Math.PI*2);
    ctx.fillStyle='#fff';
    ctx.fill();
  }

  ctx.fillStyle='#fff';
  ctx.textAlign='center';

  ctx.font='bold 54px Arial';
  ctx.fillText(lbl.l1,189,120,320);

  ctx.font='27px Arial';
  ctx.fillText(lbl.l2,189,180,320);
  ctx.fillText(lbl.l3,189,220,320);

  return c;
}

/* ---------------- SVG ---------------- */
function makeSVG(lbl){
  return `
<svg xmlns="http://www.w3.org/2000/svg" width="100mm" height="75mm">
<rect width="100%" height="100%" fill="black"/>
${showHole.checked?'<circle cx="50" cy="8" r="3" fill="white"/>' : ''}

<text x="50%" y="40%" fill="white" font-size="18" text-anchor="middle" font-weight="bold">${lbl.l1}</text>
<text x="50%" y="60%" fill="white" font-size="10" text-anchor="middle">${lbl.l2}</text>
<text x="50%" y="75%" fill="white" font-size="10" text-anchor="middle">${lbl.l3}</text>

</svg>`;
}

/* ---------------- Preview ---------------- */
previewBtn.onclick=()=>{
  allPreviews.innerHTML='';
  collect().forEach(l=>{
    allPreviews.appendChild(draw(l));
  });
};

/* ---------------- JSON ---------------- */
downloadJson.onclick=()=>{
  const blob=new Blob([JSON.stringify(collect(),null,2)]);
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='labels.json';
  a.click();
};

/* ---------------- ZIP ---------------- */
downloadZip.onclick=async()=>{
  const zip=new JSZip();
  const data=collect();

  data.forEach((lbl,i)=>{
    zip.file(`label_${i+1}.svg`,makeSVG(lbl));
  });

  zip.file("labels.json",JSON.stringify(data,null,2));

  const blob=await zip.generateAsync({type:"blob"});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download="labels.zip";
  a.click();
};
</script>

</body>
</html>
</script>

</body>
</html>
